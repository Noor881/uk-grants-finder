<!doctype html>
<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->

    <meta name="description" content="Search thousands of UK government grants, council funding schemes, and financial support opportunities. Real-time database updated every hour. Energy, business, housing, benefits and more." />

    <meta name="author" content="UK Grants Finder" />
    <link rel="canonical" href="https://uk-grants-finder.vercel.app/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://uk-grants-finder.vercel.app/" />
    <meta property="og:title" content="UK Grants Finder – Find Government Grants & Funding" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "UK Grants Finder",
      "url": "https://uk-grants-finder.vercel.app/",
      "description": "A comprehensive real-time database of UK government grants, council funding schemes, and financial support opportunities for individuals and businesses.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://uk-grants-finder.vercel.app/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      },
      "publisher": {
        "@type": "Organization",
        "name": "UK Grants Finder",
        "url": "https://uk-grants-finder.vercel.app/",
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer support",
          "email": "support@ukgrantsfinder.co.uk"
        }
      }
    }
    </script>
  </head>
